[project]
name = "spamirai-data-preprocessing"
version = "0.0.0"
description = "AI-Powered spam detection service - Data Preprocessing"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "emoji==2.15.0",
]

[dependency-groups]
dev = [
    "pandas==2.3.2",
    "pandas-stubs==2.3.2.250827",
    "pytest==8.4.2",
    "spamirai_dataset_common",
]

[tool.hatch.build]
exclude = ["/tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/spamirai_data_preprocessing"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
