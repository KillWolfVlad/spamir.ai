[project]
name = "spamirai-dataset-validate"
version = "0.0.0"
description = "AI-Powered spam detection service - Dataset Validate"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pandas==2.3.3",
    "pandas-stubs==2.3.2.250827",
    "python-dotenv==1.1.1",
    "transformers==4.57.1",
    "torch==2.9.0",
    "spamirai-dataset-common",
]

[tool.uv.sources]
torch = [
    { index = "pytorch-cpu" },
]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv]
package = false
