[project]
name = "spamirai-dataset-common"
version = "0.0.0"
description = "AI-Powered spam detection service - Dataset Common"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "natsort==8.4.0",
    "pandas==2.3.2",
    "pandas-stubs==2.3.2.250827",
]

[tool.hatch.build.targets.wheel]
packages = ["src/spamirai_dataset_common"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
